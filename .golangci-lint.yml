version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errorlint
    - gocognit
    - goconst
    - gocritic
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    gosec:
      excludes:
        - G306
    staticcheck:
      checks:
        - -S1028
        - all
        - -QF1002
  #        - -S1034
  #        - -QF1001
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Migration files share boilerplate (Migrate/Rollback closures + tx.Exec)
      # by nature; the SQL each runs is unique. dupl false-positives across the
      # migrations/ directory.
      - linters:
          - dupl
        path: internal/infrastructure/database/migrations/
      # Test files commonly repeat fixture strings ("Test Customer",
      # "example.com", "invalid-uuid", JSON field names like "name",
      # "external_id", etc.). Hoisting these into shared constants reduces
      # readability of individual test cases without improving correctness.
      - linters:
          - goconst
        path: _test\.go$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
