threads = 2
verbose = false
retries = 5
subdomains = false
parameters = false
providers = ["wayback","commoncrawl","otx","urlscan"]
blacklist = ["ttf","woff","svg","png","jpg"]

# matchextensions: when non-empty, restricts emitted URLs to those whose path
# ends in (a `.` + one of) these. Compound extensions like "tar.gz" are
# supported. Compatible with blacklist — both filters are applied.
# matchextensions = ["sql","bak","zip","tar.gz"]

# matchregex: when non-empty, restricts emitted URLs to those matching at
# least one of these Go regex patterns. Use (?i) prefix for case-insensitive.
# Match is against the full URL string.
# matchregex = ["/admin", "\\.php$"]
json = false

# useragents: optionally override the built-in User-Agent pool. Empty/unset
# means use gau's built-in list (current Chrome/Firefox/Safari/Edge). Set
# this if a specific UA gets blocked by a provider; one is picked at random
# per request.
# useragents = [
#   "Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0",
#   "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Safari/605.1.15",
# ]

# secure = true enables TLS verification. Default (false) preserves the
# historical insecure-by-default behavior so existing users aren't broken;
# set to true if your network path doesn't terminate TLS for you.
secure = false

# fpcap caps the size of the --fp dedup set (entries). 0 means unbounded.
# When the cap is exceeded, oldest entries are evicted (LRU); a URL whose
# first-occurrence host+path was evicted may emit a duplicate.
fpcap = 1000000

[urlscan]
  apikey = ""

# Per-provider rate limits (requests per second). 0 disables rate limiting.
# Conservative defaults — CommonCrawl in particular has been hammered by
# this tool historically; please keep its rate low.
[ratelimit]
  wayback = 1.0
  commoncrawl = 0.2  # one request every 5 seconds — CC is highly sensitive
  otx = 5.0
  urlscan = 2.0

[filters]
  from = ""
  to = ""
  matchstatuscodes = []
  matchmimetypes = []
  filterstatuscodes = []
  filtermimetypes = ["image/png", "image/jpg", "image/svg+xml"]
